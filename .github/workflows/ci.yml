name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 8086:80

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for DVWA
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8086/login.php && break
            sleep 2
          done

      - name: Run tests
        run: pytest -v --tb=short --timeout=300
